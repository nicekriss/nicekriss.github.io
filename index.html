<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>제이엘디자인</title>
  <meta name="description" content="제이엘디자인 — 인테리어 시공 갤러리와 문의">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <meta property="og:title" content="제이엘디자인">
  <meta property="og:description" content="공간을 새롭게, 삶을 아름답게">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://nicekriss.github.io/">
  <style>
    :root{
      --bg:#f4efe8;
      --panel:#fffdfa;
      --line:#e3d7ca;
      --text:#2a211d;
      --muted:#766960;
      --brand:#7b5d49;
      --brand-soft:#ede2d7;
      --shadow:0 16px 40px rgba(66,45,31,.08);
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,"Noto Sans KR",sans-serif;background:var(--bg);color:var(--text)}
    header{position:relative;padding:80px 16px 64px;text-align:center;background:
      linear-gradient(180deg,rgba(18,15,13,.18),rgba(18,15,13,.48)),
      url('wm_images/flowlap/cover.jpg') center/cover no-repeat;color:#fff;overflow:hidden}
    header::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.04),rgba(0,0,0,.18));pointer-events:none}
    header > *{position:relative;z-index:1}
    h1{margin:14px 0 8px;font-size:38px;letter-spacing:.3px}
    .tagline{margin:0 auto;max-width:760px;color:rgba(255,255,255,.82);line-height:1.8}
    #logo{height:70px;filter:drop-shadow(0 4px 8px rgba(0,0,0,.22))}
    nav{display:flex;gap:14px;justify-content:center;padding:14px 16px;border-bottom:1px solid var(--line);background:rgba(255,253,250,.94);position:sticky;top:0;z-index:5;backdrop-filter:blur(12px)}
    nav a{color:var(--text);text-decoration:none;padding:9px 14px;border-radius:999px}
    nav a:hover{background:var(--brand-soft)}
    .cta{margin-top:22px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
    .btn{background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.25);color:#fff;text-decoration:none;padding:11px 16px;border-radius:999px}
    .btn:hover{background:rgba(255,255,255,.22)}
    .btn-solid{background:var(--brand);border:1px solid var(--brand);color:#fff}
    .btn-solid:hover{background:#684c3a}
    section{max-width:1200px;margin:32px auto;padding:0 16px}
    h2{font-size:24px;margin:0 0 18px}
    .section-copy{color:var(--muted);margin:-6px 0 18px;line-height:1.7}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:18px}
    .card{background:var(--panel);border:1px solid var(--line);border-radius:18px;overflow:hidden;cursor:pointer;transition:transform .15s ease,box-shadow .15s ease;box-shadow:var(--shadow)}
    .card:hover{transform:translateY(-2px)}
    .thumb{width:100%;aspect-ratio:4/3;object-fit:cover;display:block}
    .meta{padding:14px 16px}
    .title{font-size:17px;font-weight:700;margin-bottom:7px}
    .desc{font-size:13px;color:var(--muted);line-height:1.7}
    .badge{display:inline-block;margin-bottom:10px;font-size:11px;font-weight:700;letter-spacing:.04em;background:var(--brand-soft);color:var(--brand);padding:6px 10px;border-radius:999px}
    .contact-list{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
    .contact-card,.uploader{background:var(--panel);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow)}
    .contact-card{padding:20px}
    .contact-card strong{display:block;margin-bottom:8px;font-size:18px}
    .contact-card p,.contact-card a{color:var(--muted);line-height:1.7;text-decoration:none}
    footer{text-align:center;color:var(--muted);padding:28px 16px;border-top:1px solid var(--line);margin-top:40px}
    .lightbox{position:fixed;inset:0;background:rgba(0,0,0,.92);display:none;align-items:center;justify-content:center;padding:24px;z-index:50}
    .lightbox.open{display:flex}.lightbox img{max-width:95vw;max-height:84vh;border-radius:14px}
    .ctrl{position:absolute;top:16px;background:rgba(255,255,255,.12);border:1px solid #ffffff22;color:#fff;padding:8px 12px;border-radius:10px;cursor:pointer;backdrop-filter:blur(4px)}
    #btnClose{right:16px}#btnPrev,#btnNext{top:50%;transform:translateY(-50%)}#btnPrev{left:16px}#btnNext{right:16px}
    .counter{position:absolute;bottom:18px;left:50%;transform:translateX(-50%);color:#fff;background:rgba(0,0,0,.35);padding:6px 10px;border-radius:8px;font-size:12px}
    .uploader{padding:22px}
    .uploader-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
    .field{display:grid;gap:8px;margin-bottom:14px}
    .field label{font-weight:700}
    .field input,.field textarea{width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:14px;background:#fff;color:var(--text);font:inherit}
    .field textarea{min-height:120px;resize:vertical}
    .dropzone{border:1.5px dashed #cdb8a8;border-radius:18px;background:#fbf7f2;min-height:220px;padding:24px;display:grid;place-items:center;text-align:center;transition:.15s ease}
    .dropzone.dragover{background:#f2e7db;border-color:var(--brand)}
    .dropzone strong{display:block;font-size:20px;margin-bottom:10px;color:var(--brand)}
    .dropzone p{margin:0;color:var(--muted);line-height:1.7}
    #fileInput{display:none}
    .actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px}
    .preview-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:12px;margin-top:14px}
    .preview{position:relative;border-radius:14px;overflow:hidden;border:1px solid var(--line);background:#efe4da}
    .preview img{width:100%;aspect-ratio:1/1;object-fit:cover;display:block}
    .preview span{position:absolute;left:8px;right:8px;bottom:8px;background:rgba(0,0,0,.56);color:#fff;border-radius:10px;padding:5px 7px;font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .status,.help{font-size:13px;line-height:1.7;color:var(--muted)}
    .status{margin-top:10px;color:var(--brand);font-weight:700}
    @media (max-width: 840px){.uploader-grid,.contact-list{grid-template-columns:1fr}}
    @media (prefers-reduced-motion: reduce){.card,.dropzone{transition:none}}
  </style>
</head>
<body>
  <script>
    const SITE = {
      name   : "제이엘디자인",
      tagline: "공간을 새롭게, 삶을 아름답게",
      phone  : "010-6436-6401",
      email  : "jldesign77@naver.com",
      kakao  : "http://pf.kakao.com/_xeigDxj/chat"
    };
    const IMG_BASE = "wm_images";
    const IMG_FALLBACK = "images";
    const CUSTOM_STORAGE_KEY = "jl-design-custom-projects-v3";
    document.title = SITE.name;
  </script>

  <header>
    <img id="logo" src="jl_monogram_luxe.svg" alt="제이엘디자인 로고" decoding="async" loading="eager">
    <h1 id="brand">제이엘디자인</h1>
    <p class="tagline" id="tagline">공간을 새롭게, 삶을 아름답게</p>
    <div class="cta" aria-label="빠른 문의">
      <a class="btn" id="btnCall" href="#" aria-label="전화 걸기">전화 문의</a>
      <a class="btn" id="btnKakao" href="http://pf.kakao.com/_xeigDxj/chat" target="_blank" rel="noopener">카카오톡 상담</a>
      <a class="btn" id="btnEmail" href="#" aria-label="이메일 보내기">이메일 문의</a>
    </div>
  </header>

  <nav role="navigation" aria-label="주요 메뉴">
    <a href="#projects" aria-current="page">시공 갤러리</a>
    <a href="#uploader">포트폴리오 업로드</a>
    <a href="#contact">문의하기</a>
  </nav>

  <section id="projects">
    <h2>시공 갤러리</h2>
    <p class="section-copy" id="galleryNote">기존 트폴리오와 직접 추가한 프로젝트를 함께 보여드립니다.</p>
    <div class="grid" id="grid" aria-live="polite"></div>
  </section>

  <section id="uploader">
    <h2>포트폴리오 직접 올리기</h2>
    <p class="section-copy">프로젝트명과 간단한 설명을 적고 이미지를 여러 장 한 번에 올릴 수 있습니다. 업로드한 항목은 현재 브라우저에 저장됩니다.</p>
    <div class="uploader">
      <div class="uploader-grid">
        <div>
          <div class="field">
            <label for="projectTitle">프로젝트명</label>
            <input id="projectTitle" type="text" maxlength="60" placeholder="예: 성수동 쇼룸">
          </div>
          <div class="field">
            <label for="projectDesc">간단한 설명</label>
            <textarea id="projectDesc" maxlength="240" placeholder="예: 우드 톤과 간접조명 중심의 따뜻한 상업 공간입니다."></textarea>
          </div>
          <div class="actions">
            <button class="btn btn-solid" id="saveProject" type="button">저장하기</button>
            <button class="btn btn-solid" id="resetUploader" type="button" style="background:#a58a76;border-color:#a58a76">초기화</button>
          </div>
          <div class="status" id="uploadStatus">아직 선택된 이미지가 없습니다.</div>
          <div class="help">정적 사이트 특성상 서버 업로드가 아니라 브라우저 저장소(localStorage)에 저장됩니다.</div>
        </div>
        <div>
          <label class="dropzone" id="dropzone" for="fileInput">
            <input id="fileInput" type="file" accept="image/*" multiple>
            <div>
              <strong>이미지를 끌어다 놓으세요</strong>
              <p>또는 클릭해서 여러 장을 한 번에 선택할 수 있습니다.</p>
            </div>
          </label>
          <div class="preview-grid" id="previewGrid"></div>
        </div>
      </div>
    </div>
  </section>

  <section id="contact">
    <h2>문의하기</h2>
    <div class="contact-list" id="contactList"></div>
  </section>

  <footer>© <span id="year"></span> <span id="brandFoot">제이엘디자인</span></footer>

  <div class="lightbox" id="lightbox" aria-modal="true" role="dialog" aria-label="이미지 보기">
    <img id="lightImg" alt="">
    <button class="ctrl" id="btnClose">닫기</button>
    <button class="ctrl" id="btnPrev" aria-label="이전 이미지">←</button>
    <button class="ctrl" id="btnNext" aria-label="다음 이미지">→</button>
    <div class="counter" id="counter" aria-live="polite"></div>
  </div>

  <script>
    const $ = s => document.querySelector(s);
    const logo = $('#logo');
    const grid = $('#grid');
    const lightbox = $('#lightbox');
    const lightImg = $('#lightImg');
    const counter = $('#counter');
    const btnClose = $('#btnClose');
    const btnPrev = $('#btnPrev');
    const btnNext = $('#btnNext');
    const galleryNote = $('#galleryNote');
    const dropzone = $('#dropzone');
    const fileInput = $('#fileInput');
    const previewGrid = $('#previewGrid');
    const uploadStatus = $('#uploadStatus');
    const projectTitle = $('#projectTitle');
    const projectDesc = $('#projectDesc');
    const saveProject = $('#saveProject');
    const resetUploader = $('#resetUploader');

    let baseProjects = [];
    let projects = [];
    let selectedFiles = [];
    let cur = { p:-1, i:0 };

    logo.onerror = () => logo.style.display = 'none';
    $('#brand').textContent = SITE.name;
    $('#tagline').textContent = SITE.tagline;
    $('#brandFoot').textContent = SITE.name;
    $('#year').textContent = new Date().getFullYear();
    $('#btnCall').href = 'tel:' + SITE.phone.replaceAll('-', '');
    $('#btnEmail').href = 'mailto:' + SITE.email;
    $('#btnKakao').href = SITE.kakao;
    $('#contactList').innerHTML = `
      <article class="contact-card"><strong>전화 문의</strong><p><a href="tel:${SITE.phone.replaceAll('-', '')}">${SITE.phone}</a></p></article>
      <article class="contact-card"><strong>이메일 문의</strong><p><a href="mailto:${SITE.email}">${SITE.email}</a></p></article>
      <article class="contact-card"><strong>카카오톡 상담</strong><p><a href="${SITE.kakao}" target="_blank" rel="noopener">채널 바로가기</a></p></article>
    `;

    function setImgWithFallback(el, primary, fallback) {
      el.src = primary;
      el.onerror = () => { el.onerror = null; el.src = fallback; };
    }

    function readCustomProjects() {
      try {
        const list = JSON.parse(localStorage.getItem(CUSTOM_STORAGE_KEY) || '[]');
        return Array.isArray(list) ? list : [];
      } catch (error) {
        console.error(error);
        return [];
      }
    }

    function writeCustomProjects(list) {
      localStorage.setItem(CUSTOM_STORAGE_KEY, JSON.stringify(list));
    }

    function normalizeBaseProjects(list) {
      return list.map(p => {
        const imgs = Array.isArray(p.images) ? [...p.images] : [];
        const i = imgs.indexOf(p.cover);
        if (i > 0) {
          const [cover] = imgs.splice(i, 1);
          imgs.unshift(cover);
        }
        return { ...p, images: imgs, isCustom:false };
      }).reverse();
    }

    function mergeProjects() {
      const custom = readCustomProjects().sort((a, b) => new Date(b.savedAt) - new Date(a.savedAt));
      projects = [...custom, ...baseProjects];
      galleryNote.textContent = `총 ${projects.length}개의 프로젝트가 보입니다. 직접 올린 항목도 바로 함께 표시됩니다.`;
    }

    function card(p, idx) {
      const wrap = document.createElement('article');
      wrap.className = 'card';
      wrap.tabIndex = 0;
      const thumb = document.createElement('img');
      thumb.className = 'thumb';
      thumb.alt = p.title || p.id;
      thumb.decoding = 'async';
      thumb.loading = 'lazy';
      if (p.isCustom) thumb.src = p.images[0];
      else setImgWithFallback(thumb, `${IMG_BASE}/${p.id}/${p.cover}`, `${IMG_FALLBACK}/${p.id}/${p.cover}`);
      const meta = document.createElement('div');
      meta.className = 'meta';
      meta.innerHTML = `${p.isCustom ? '<span class="badge">직접 업로드</span>' : ''}<div class="title">${p.title || p.id}</div><div class="desc">${p.desc || ''}</div>`;
      wrap.append(thumb, meta);
      const open = () => openLightbox(idx, 0);
      wrap.addEventListener('click', open);
      wrap.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); open(); } });
      return wrap;
    }

    function render() {
      grid.innerHTML = '';
      if (!projects.length) {
        grid.innerHTML = '<p class="section-copy">표시할 포트폴리오가 없습니다.</p>';
        return;
      }
      const frag = document.createDocumentFragment();
      projects.forEach((p, idx) => frag.appendChild(card(p, idx)));
      grid.appendChild(frag);
    }

    function openLightbox(pIndex, imgIndex) {
      cur = { p: pIndex, i: imgIndex };
      const p = projects[cur.p];
      const src = p.images[cur.i];
      if (p.isCustom) lightImg.src = src;
      else setImgWithFallback(lightImg, `${IMG_BASE}/${p.id}/${src}`, `${IMG_FALLBACK}/${p.id}/${src}`);
      counter.textContent = `${cur.i + 1} / ${p.images.length} · ${p.title || p.id}`;
      lightbox.classList.add('open');
    }
    function closeLightbox() { lightbox.classList.remove('open'); }
    function prev() { const p = projects[cur.p]; cur.i = (cur.i - 1 + p.images.length) % p.images.length; openLightbox(cur.p, cur.i); }
    function next() { const p = projects[cur.p]; cur.i = (cur.i + 1) % p.images.length; openLightbox(cur.p, cur.i); }

    btnClose.onclick = closeLightbox; btnPrev.onclick = prev; btnNext.onclick = next;
    lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });
    window.addEventListener('keydown', e => {
      if (!lightbox.classList.contains('open')) return;
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowLeft') prev();
      if (e.key === 'ArrowRight') next();
    });

    function updatePreview() {
      previewGrid.innerHTML = '';
      if (!selectedFiles.length) {
        uploadStatus.textContent = '아직 선택된 이미지가 없습니다.';
        return;
      }
      selectedFiles.forEach(file => {
        const item = document.createElement('div');
        item.className = 'preview';
        item.innerHTML = `<img src="${file.dataUrl}" alt="${file.name}"><span>${file.name}</span>`;
        previewGrid.appendChild(item);
      });
      uploadStatus.textContent = `${selectedFiles.length}장의 이미지를 선택했습니다.`;
    }

    function resetForm(message = '아직 선택된 이미지가 없습니다.') {
      selectedFiles = [];
      projectTitle.value = '';
      projectDesc.value = '';
      fileInput.value = '';
      updatePreview();
      uploadStatus.textContent = message;
    }

    async function handleFiles(fileList) {
      const imageFiles = Array.from(fileList).filter(file => file.type.startsWith('image/'));
      const entries = await Promise.all(imageFiles.map(file => new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve({ name:file.name, dataUrl:reader.result });
        reader.onerror = reject;
        reader.readAsDataURL(file);
      })));
      selectedFiles = [...selectedFiles, ...entries];
      updatePreview();
    }

    dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('dragover'); });
    dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
    dropzone.addEventListener('drop', async e => {
      e.preventDefault();
      dropzone.classList.remove('dragover');
      await handleFiles(e.dataTransfer.files);
    });
    fileInput.addEventListener('change', async e => { await handleFiles(e.target.files); });

    saveProject.addEventListener('click', () => {
      const title = projectTitle.value.trim();
      const desc = projectDesc.value.trim();
      if (!title) { uploadStatus.textContent = '프로젝트명을 입력해 주세요.'; projectTitle.focus(); return; }
      if (!selectedFiles.length) { uploadStatus.textContent = '이미지를 1장 이상 추가해 주세요.'; return; }
      const custom = readCustomProjects();
      custom.unshift({
        id:`custom-${Date.now()}`,
        title,
        desc,
        cover:selectedFiles[0].name,
        images:selectedFiles.map(file => file.dataUrl),
        isCustom:true,
        savedAt:new Date().toISOString()
      });
      writeCustomProjects(custom);
      mergeProjects();
      render();
      resetForm('저장되었습니다. 위 시공 갤러리에서 바로 확인할 수 있습니다.');
    });

    resetUploader.addEventListener('click', () => resetForm('입력값을 초기화했습니다.'));

    fetch('projects.json?v=' + Date.now(), { cache:'no-store' })
      .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
      .then(list => {
        if (!Array.isArray(list)) throw new Error('JSON is not an array');
        baseProjects = normalizeBaseProjects(list);
        mergeProjects();
        render();
      })
      .catch(error => {
        console.error(error);
        baseProjects = [];
        mergeProjects();
        render();
        galleryNote.textContent = '기존 프로젝트를 불러오지 못했지만 직접 업로드 기능은 사용할 수 있습니다.';
      });
  </script>
</body>
</html>
